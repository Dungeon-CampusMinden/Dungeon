syntax = "proto3";

package dungeon.c2s;

option java_multiple_files = true;
option java_package = "core.network.proto.c2s";
option java_outer_classname = "SnapshotAckProto";

message SnapshotAck {
  int32 server_tick = 1;
  bool resync_requested = 2;
  int32 missing_base_tick = 3;
  int32 delta_tick = 4;
}
