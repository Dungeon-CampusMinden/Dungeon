/* TODO This project should use plugin 'application' instead of defining its own run task */
plugins {
    id 'application'
    id 'antlr'
}

application {
    // Define the main class for the application
    mainClass = 'client.Client'
}

// Optional switch to start the Vite frontend and open it in a browser
ext.frontendUrl = 'http://localhost:5173/'
ext.shouldStartFrontend = {
    def flag = project.findProperty('startFrontend') ?: project.findProperty('frontend')
    flag != null && flag.toString().toBoolean()
}

sourceSets.main.resources.srcDirs = ['assets/']

dependencies {
    implementation project(':dungeon')
    implementation project(':blockly:dgir-compiler')
    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.27.1'

    // ANTLR version 4 for DSL Grammar
    antlr supportDependencies.antlr

    // JUnit 4 and Mockito for testing
    testImplementation supportDependencies.junit
    testRuntimeOnly supportDependencies.junitLauncher
}

// generate ANTLR visitor and listener classes from grammar
generateGrammarSource {
    maxHeapSize = '64m'
    arguments += ['-visitor', '-listener', '-long-messages']
}

tasks.register('runJar', JavaExec) {
    group = 'application'
    classpath tasks.named('jar').map { it.outputs }
    println(project.properties)
}

jar{
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes('Main-Class': 'client.Client')
    }
    // Bundle runtime classpath into the fat jar so all jar dependencies are included.
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    dependsOn project(':blockly:dgir-compiler').tasks.named('jar')
}

// Start the Vite dev server in the background when requested
tasks.register('startFrontend') {
    onlyIf { shouldStartFrontend() }
    doLast {
        logger.lifecycle('Starting Blockly frontend with `npm run dev`...')
        def pb = new ProcessBuilder(['npm', 'run', 'dev'])
        pb.directory(file('frontend'))
        pb.redirectErrorStream(true)
        pb.inheritIO()
        pb.start()
    }
}

tasks.register('openFrontend') {
    onlyIf { shouldStartFrontend() }
    dependsOn 'startFrontend'
    doLast {
        try {
            exec { commandLine 'xdg-open', frontendUrl }
        } catch (Exception ignored) {
            try {
                exec { commandLine 'open', frontendUrl }
            } catch (Exception ignored2) {
                logger.lifecycle("Open ${frontendUrl} in your browser.")
            }
        }
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

// Wire optional frontend startup into run/runJar
[ tasks.named('run'), tasks.named('runJar') ].each { TaskProvider taskProvider ->
    taskProvider.configure {
        if (shouldStartFrontend()) {
            dependsOn 'openFrontend'
        }
    }
}

repositories {
    mavenCentral()
}
