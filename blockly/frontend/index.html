<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockly Dungeon</title>
  <link rel="hsbi-icon" href="/favicon.ico" type="image/x-icon" />
</head>
<body>
<header>

  <h1 id="page-title">Blockly Dungeon</h1>

    <div class="headerRightContainer">
        <img data-lang="en" class="flag" src="/english-flag.svg" alt="English flag">
<!--        <img data-lang="de" class="flag" src="/german-flag.svg" alt="german flag">-->
        <img data-lang="de" id="cat-logo" src="/cat_logo.png" alt="cat-logo" />
    </div>



</header>

<div id="pageContainer">
    <div class="popupDiv">
        <p class="popupText">hier kommt der popup text hin</p>

        <div class="cross">
            <span></span>
        </div>

    </div>
  <div id="blockly"></div>
</div>

<div id="config_div">
  <label for="delay">Verzögerung (in Sek.)</label>
  <input
          type="text"
          inputmode="numeric"
          id="delay"
          name="delay"
          min="1"
          max="5"
  />
</div>

<div id="buttons">
  <button type="button" id="startBtn">Start</button>
  <button type="button" id="resetBtn">Reset</button>

</div>

<script type="module" src="/src/index.ts"></script>

</body>
</html>
