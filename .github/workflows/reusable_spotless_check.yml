name: Check Spotless
on:
  workflow_call:

jobs:
  check_spotless:
    name: Check Spotless
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Grade executable
        run: chmod +x ./gradlew
      - name: Check Spotless
        run: ./gradlew spotlessCheck