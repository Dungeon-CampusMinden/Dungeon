name: Build and Release Blockly JARs

on:
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            # 1. Node.js Setup für das Frontend
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: 'blockly/frontend/package-lock.json'

            # 2. Frontend bauen
            - name: Build Frontend
              run: |
                  cd blockly/frontend
                  npm install
                  npm run build

            # 3. Java Setup
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Make gradlew executable
              run: chmod +x gradlew

            # 4. Jar desktop and web
            - name: Build JARs with Gradle
              run: ./gradlew jarDesktop jarWeb

            # 5. save both jar artefacts
            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Blockly-JARs
                  path: blockly/build/libs/*.jar
    upload_extension:
        runs-on: ubuntu-latest
        steps:

            -   name: Checkout Repository
                uses: actions/checkout@v7

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: vs-code-extension
                  path: doc/produs_unterlagen/blockly-code-runner-*.vsix

    buildExecutables:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      platform_name: windows-x86_64
                    - os: ubuntu-latest
                      platform_name: linux-x86_64
        steps:
            -   name: Checkout Code
                uses: actions/checkout@v7

            -   name: Set up JDK
                uses: actions/setup-java@v5
                with:
                    java-version: '25'
                    distribution: 'temurin'
            -   name: Make gradlew executable
                run: chmod +x gradlew

            -   name: Build with JLink
                run: ./gradlew :blockly:jpackageImage

            -   name: Archive Executable
                # zip the folder
                run: |
                    if [ "${{ runner.os }}" == "Windows" ]; then
                      7z a Blockly-desktop-${{ matrix.platform_name }}.zip  ./blockly/build/jpackage/blockly
                    else
                      tar -czf Blockly-desktop-${{ matrix.platform_name }}.tar.gz -C blockly/build/jpackage blockly
                    fi
                shell: bash


            -   name: Build with JLink 2
                run: ./gradlew :blockly:jpackageImageWeb

            -   name: Archive Executable
                # zip the folder
                run: |
                    if [ "${{ runner.os }}" == "Windows" ]; then
                      7z a Blockly-web-${{ matrix.platform_name }}.zip  ./blockly/build/jpackage/blockly-web
                    else
                      tar -czf Blockly-web-${{ matrix.platform_name }}.tar.gz -C blockly/build/jpackage blockly-web
                    fi
                shell: bash

            -   name: Upload Artifacts
                uses: actions/upload-artifact@v7
                with:
                    name: executable-${{ matrix.os }}
                    path: Blockly-*
    deploy:
        needs: [build, upload_extension, buildExecutables]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  merge-multiple: true

            - name: Create GitHub Release
              run: |
                TAG="v1.0.${{ github.run_number }}"
                gh release create "$TAG" *.jar *.vsix *.zip *.tar.gz \
                  --title "Dungeon Games" \
                  --notes-file ".github/workflows/releaseInstructions.md" \
                  --draft=true \
                  --prerelease=false
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
