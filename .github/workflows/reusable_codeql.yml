name: "CodeQL Analysis"

on:
  workflow_call:

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: java
        config: |
          threat-models: local

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:java"
        output: report          
        upload: always          

    - name: Save CodeQL Report
      uses: actions/upload-artifact@v4
      with:
        name: codeql-report
        path: report
    
    - name: Print CodeQL Report
      if: always()
      run: |
        sarif=$(find report -name '*.sarif' | head -1)
        count=$(jq '[.runs[].results[]] | length' "$sarif")
        {
          echo "## 🔎 CodeQL-Ergebnis"
          if [ "$count" -eq 0 ]; then
            echo "✅ Keine Probleme gefunden."
          else
            echo "⚠️ **$count Fund(e)**"
            echo ""
            echo "| Regel | Datei | Zeile | Beschreibung |"
            echo "|-------|-------|-------|--------------|"
            jq -r '.runs[].results[]
              | "| `\(.ruleId)` | \(.locations[0].physicalLocation.artifactLocation.uri | split("/") | last) | \(.locations[0].physicalLocation.region.startLine) | \(.message.text) |"' "$sarif"
          fi
        } >> "$GITHUB_STEP_SUMMARY"