name: Build and Release Last Hour

on:
    workflow_dispatch:
    push:
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            # 3. Java Setup
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Make gradlew executable
              run: chmod +x gradlew

            # 4. Jar desktop and web
            - name: Build JARs with Gradle
              run: ./gradlew buildTheLastHourJar buildTheLastHourServerJar buildTheLastHourClientJar

            # 5. save both jar artefacts
            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Blockly-JARs
                  path: blockly/build/libs/*.jar
