name: Build and Release Last Hour

on:
    workflow_dispatch:
    push:
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            # Java Setup
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Make gradlew executable
              run: chmod +x gradlew

            # 4. Jar desktop and web
            - name: Build JARs with Gradle
              run: ./gradlew buildTheLastHourJar buildTheLastHourServerJar buildTheLastHourClientJar

            # 5. save both jar artefacts
            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Blockly-JARs
                  path: theLastHourEscapeRoom/build/libs/*.jar

    buildExecutables:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                # run on ubuntu and windows
                os: [ ubuntu-latest, windows-latest]
        steps:
            -   name: Checkout Code
                uses: actions/checkout@v6

            -   name: Set up JDK
                uses: actions/setup-java@v5
                with:
                    java-version: '25'
                    distribution: 'temurin'
            -   name: Make gradlew executable
                run: chmod +x gradlew

            -   name: Build last hour
                run: ./gradlew jpackageImageTheLastHour

            -   name: Archive theLastHourEscapeRoom
                # zip the folder
                run: |
                    if [ "${{ runner.os }}" == "Windows" ]; then
                      7z a Last-Hour-windows.zip  ./theLastHourEscapeRoom/build/jpackage/theLastHourEscapeRoom
                    else
                      zip -r Last-Hour-${{ matrix.os }}.zip theLastHourEscapeRoom/build/jpackage/theLastHourEscapeRoom
                    fi
                shell: bash


#            -   name: Build Last Hour Server
#                run: ./gradlew jpackageImageTheLastHourServer
#
#            -   name: Archive TheLastHourServer
#                # zip the folder
#                run: |
#                    if [ "${{ runner.os }}" == "Windows" ]; then
#                      7z a Last-Hour-Server-Windows.zip  ./theLastHourEscapeRoom/build/jpackage/TheLastHourServer
#                    else
#                      zip -r Last-Hour-Server-${{ matrix.os }}.zip theLastHourEscapeRoom/build/jpackage/TheLastHourServer
#                    fi
#                shell: bash
#
#
#            -   name: Build Last Hour Client
#                run: ./gradlew jpackageImageTheLastHourClient
#
#            -   name: Archive TheLastHourClient
#                # zip the folder
#                run: |
#                    if [ "${{ runner.os }}" == "Windows" ]; then
#                      7z a Last-Hour-Client-Windows.zip  ./theLastHourEscapeRoom/build/jpackage/TheLastHourClient
#                    else
#                      zip -r Last-Hour-Client-${{ matrix.os }}.zip theLastHourEscapeRoom/build/jpackage/TheLastHourClient
#                    fi
#                shell: bash

            -   name: Upload Artifacts
                uses: actions/upload-artifact@v7
                with:
                    name: executable-${{ matrix.os }}
                    path: Last-Hour-*.zip
    deploy:
        needs: [build, buildExecutables]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  merge-multiple: true

            - name: Create GitHub Release
              run: |
                  TAG="v1.0.${{ github.run_number }}"
                  gh release create "$TAG" *.jar *.zip\
                    --title "The Last Hour (Cyber Security Escape Room)" \
                    --notes-file ".github/workflows/releaseInstructionsLastHour.md" \
                    --draft=true \
                    --prerelease=false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
