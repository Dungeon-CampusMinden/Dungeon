name: Build
on:
  pull_request:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Grade executable
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew build