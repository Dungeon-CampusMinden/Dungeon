name: Apply Spotless
on:
  pull_request:

jobs:
  apply_spotless:
    name: Apply Spotless
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Grade executable
        run: chmod +x ./gradlew
      - name: Apply Spotless
        run: ./gradlew spotlessApply
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply Spotless formatting"
          skip_fetch: false
          skip_checkout: false
