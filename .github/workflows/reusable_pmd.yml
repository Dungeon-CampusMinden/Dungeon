name: Check PMD
on:
  workflow_call:

jobs:
  check_pmd:
    name: PMD Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Grade executable
        run: chmod +x ./gradlew
      - name: PMD Check
        run: ./gradlew pmdTest
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: '**/build/reports/pmd/'
          retention-days: 7