name: Apply Spotless on PR

on:
    issue_comment:
        types: [created]

jobs:
    apply-spotless:
        name: Apply Spotless

        if: |
            github.event.issue.pull_request != null &&
            github.event.comment.body == '/spotless' &&
            (
                github.event.comment.author_association == 'OWNER' ||
                github.event.comment.author_association == 'MEMBER' ||
                github.event.comment.author_association == 'COLLABORATOR'
            )

        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: read

        concurrency:
            group: spotless-${{ github.event.issue.number }}
            cancel-in-progress: false

        steps:
            - name: Get PR branch
              id: pr
              run: |
                  PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName -q .headRefName)
                  echo "branch=$PR_BRANCH" >> $GITHUB_OUTPUT
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Checkout PR Branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ steps.pr.outputs.branch }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: '21'

            - name: Apply Spotless
              run: ./gradlew spotlessApply

            - name: Commit and push changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  if ! git diff --quiet; then
                      git add -A
                      git commit -m "style: apply spotless"
                      git push
                  else
                      echo "No changes to commit."
                  fi
